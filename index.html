<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buon 19° Compleanno Erika!</title>
    <style>
        /* Impostazioni di base e colori */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            color: #333;
        }

        /* Contenitore principale (stile card) */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            transition: all 0.5s ease;
        }

        /* Classe per nascondere le schermate */
        .hidden {
            display: none !important;
        }

        /* Stile dei testi */
        h1 {
            color: #ff4d6d;
            margin-bottom: 5px;
            font-size: 28px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Stile input e bottone */
        input {
            padding: 12px;
            width: 80%;
            margin: 10px 0;
            border: 2px solid #ffb3c6;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #ff4d6d;
        }

        button {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
            width: 80%;
        }

        button:hover {
            background-color: #c9184a;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Area messaggi di errore/suggerimento */
        #message-area {
            margin-top: 20px;
            color: #d90429;
            font-weight: bold;
            min-height: 24px;
            font-size: 15px;
        }

        /* Schermata di successo */
        .success-title {
            color: #ff4d6d;
            font-size: 26px;
        }

        .birthday-wish {
            font-size: 28px;
            font-weight: bold;
            color: #c9184a;
            margin: 15px 0;
        }

        /* Immagine del concerto */
        #concert-image {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 15px;
            border: 3px solid #ffb3c6;
        }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>Per Erika ✨</h1>
        <p>Inserisci password</p>
        
        <input type="text" id="password-input" placeholder="Scrivi qui..." autocomplete="off">
        <br>
        <button onclick="checkPassword()">Sblocca</button>
        
        <div id="message-area"></div>
    </div>

    <div class="container hidden" id="success-screen">
        <h1 class="success-title">Brava, ecco qua!</h1>
        
        <img id="concert-image" src="posto.jpg" alt="I nostri posti per Achille Lauro">
        
        <div class="birthday-wish">Buon Compleanno ❤️</div>
        <p>Ci vediamo da Achille Lauro!</p>
    </div>

    <script>
        // Variabili per il controllo della logica
        let tentativi = 0;
        
        // Frasi motivazionali casuali
        const frasiMotivazionali = [
            "Dai, riprovaci! Non è questa.",
            "Non arrenderti, concentrati!",
            "Pensa bene... puoi farcela!",
            "Sbagliando s'impara. Ancora uno sforzo!",
            "Quasi... ma no! Riprova.",
            "Metticela tutta, so che lo sai!"
        ];

        // Funzione attivata al click del bottone
        function checkPassword() {
            // Prendo la password, rimuovo gli spazi vuoti e la metto in maiuscolo
            // così se scrive "lauro", "Lauro" o " LAURO " viene accettata comunque
            const inputElement = document.getElementById('password-input');
            const passwordInserita = inputElement.value.trim().toUpperCase();
            const messageArea = document.getElementById('message-area');

            // Controllo se la password è corretta
            if (passwordInserita === "LAURO") {
                // Nascondo la schermata di login e mostro quella di successo
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
            } else {
                // Se la password è sbagliata
                tentativi++;
                
                // Pulisce l'input per comodità
                inputElement.value = "";
                inputElement.focus();

                // Se ha sbagliato 5 o più volte, mostro il suggerimento
                if (tentativi >= 5) {
                    messageArea.innerHTML = "💡 Suggerimento: Impiccato";
                } else {
                    // Altrimenti mostro una frase motivazionale a caso
                    const fraseCasuale = frasiMotivazionali[Math.floor(Math.random() * frasiMotivazionali.length)];
                    messageArea.innerText = fraseCasuale;
                }
            }
        }

        // Permette di premere "Invio" sulla tastiera per confermare la password
        document.getElementById("password-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });
    </script>

</body>
</html>
